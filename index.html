<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UPI Payment</title>

  <style>

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:320px;
      background:white;
      padding:30px;
      border-radius:14px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#5f259f;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:16px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:14px;
      background:#5f259f;
      color:white;
      border:none;
      border-radius:8px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

  </style>
</head>

<body>

  <div class="container">

    <h2>UPI Payment</h2>

    <input
      type="text"
      id="name"
      placeholder="Enter Name"
    >

    <input
      type="text"
      id="flat"
      placeholder="Enter Flat Number"
    >

    <button onclick="payNow()">
      Pay ₹1 with PhonePe
    </button>

  </div>

  <script>

    function payNow() {

      const name =
        document.getElementById("name").value.trim();

      const flat =
        document.getElementById("flat").value.trim();

      if (!name || !flat) {
        alert("Please fill all fields");
        return;
      }

      const note = name + "_" + flat;

      const upiUrl =
        "upi://pay?pa=santra42.2009@okhdfcbank" +
        "&pn=Debaleena%20Galaxia%20II" +
        "&tn=" + encodeURIComponent(note) +
        "&am=1" +
        "&cu=INR";

      const isAndroid =
        /Android/i.test(navigator.userAgent);

      const isiPhone =
        /iPhone|iPad|iPod/i.test(navigator.userAgent);

      if (isAndroid) {

        const intentUrl =
          "intent://" +
          upiUrl.replace("upi://", "") +
          "#Intent;" +
          "scheme=upi;" +
          "package=com.phonepe.app;" +
          "end";

        window.location.href = intentUrl;

      } else if (isiPhone) {

        const phonePeIosUrl =
          "phonepe://pay?pa=santra42.2009@okhdfcbank" +
          "&pn=Siddha%20Galaxia%20II" +
          "&tn=" + encodeURIComponent(note) +
          "&am=1" +
          "&cu=INR";

        window.location.href = phonePeIosUrl;

      } else {

        window.location.href = upiUrl;

      }

    }

  </script>

</body>
</html>
